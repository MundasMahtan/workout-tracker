<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker v6</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary-green: #2ecc71;
            --dark-bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-light: #ffffff;
            --text-dim: #b0b0b0;
            --gold: #f39c12;
            --success: #27ae60;
            --warning: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg);
            color: var(--text-light);
            padding: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary-green);
        }

        .header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }

        .header-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .info-item { display: flex; justify-content: space-between; }
        .info-value { color: var(--primary-green); font-weight: 600; }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .btn-primary { background: var(--primary-green); color: var(--dark-bg); }
        .btn-primary:hover { background: #27ae60; transform: translateY(-2px); }

        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-light);
            border: 2px solid var(--primary-green);
        }

        .btn-secondary:hover { background: var(--primary-green); color: var(--dark-bg); }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.85rem; }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primary-green);
        }

        .card h2 { font-size: 1.3rem; margin-bottom: 1rem; color: var(--primary-green); }

        .session-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            align-items: center;
            padding: 1rem;
            background: rgba(46, 204, 113, 0.05);
            border-radius: 6px;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            .session-row { grid-template-columns: 1fr; }
        }

        .session-label { color: var(--text-dim); font-size: 0.85rem; }

        .session-status {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .status-completed { background: var(--success); color: white; }
        .status-skipped { background: var(--warning); color: white; }
        .status-pending { background: var(--text-dim); color: var(--dark-bg); }
        .status-pending:hover { background: var(--gold); }
        .status-inactive { background: rgba(255,255,255,0.08); color: var(--text-dim); }
        .status-inactive:hover { background: var(--gold); color: var(--dark-bg); }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            border: 2px solid var(--primary-green);
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 { margin-bottom: 1.5rem; color: var(--primary-green); }

        .form-group { margin-bottom: 1.5rem; }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--primary-green);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--primary-green);
            border-radius: 4px;
            color: var(--text-light);
            font-size: 1rem;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            background: rgba(46, 204, 113, 0.1);
        }

        .form-group select option { background: var(--card-bg); }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .modal-close { background: var(--text-dim); color: var(--dark-bg); }
        .modal-close:hover { background: var(--text-light); }

        .program-view {
            background: rgba(46, 204, 113, 0.05);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        .program-view h4 { color: var(--primary-green); margin-bottom: 0.5rem; }

        .program-section {
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(46, 204, 113, 0.2);
        }

        .program-section:last-child { border-bottom: none; }
        .section-name { font-weight: 600; color: var(--text-light); margin-bottom: 0.3rem; }
        .section-distance { font-size: 0.85rem; color: var(--primary-green); }

        .section-details {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: 0.3rem;
            margin-left: 1rem;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .stat-box {
            background: rgba(46, 204, 113, 0.05);
            padding: 1rem;
            border-radius: 6px;
            text-align: center;
            border: 1px solid rgba(46, 204, 113, 0.2);
        }

        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--primary-green); }
        .stat-label { font-size: 0.85rem; color: var(--text-dim); margin-top: 0.3rem; }

        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: var(--card-bg);
            border: 2px solid var(--text-dim);
            color: var(--text-light);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary-green);
            color: var(--dark-bg);
            border-color: var(--primary-green);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .override-btn {
            background: white;
            border: 2px solid var(--primary-green);
            color: var(--primary-green);
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }

        .override-btn:hover { background: var(--primary-green); color: white; }

        .pattern-card {
            background: rgba(46, 204, 113, 0.05);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            border: 2px solid rgba(46, 204, 113, 0.2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .pattern-card:hover {
            border-color: var(--primary-green);
            background: rgba(46, 204, 113, 0.1);
        }

        .pattern-card.selected {
            border-color: var(--primary-green);
            background: rgba(46, 204, 113, 0.2);
        }

        .pattern-name { font-weight: 600; color: var(--primary-green); margin-bottom: 0.5rem; }
        .pattern-desc { font-size: 0.85rem; color: var(--text-dim); }

        .warning-banner {
            background: rgba(243, 156, 18, 0.1);
            border-left: 4px solid var(--gold);
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            color: var(--gold);
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        class WorkoutApp {
            constructor() {
                this.data = this.loadData();
                this.justFinishedSwim = false;
                this.justFinishedStrength = false;
                this.render();
            }

            defaultData() {
                return {
                    userWeight: null,
                    programStart: new Date().toISOString(),
                    swimProgramWeek: 1,
                    currentStrengthLevel: 0,
                    swimReachedWeek20: false,
                    strengthReachedWeek20: false,
                    swimMaintenancePattern: 'maintenance',
                    strengthMaintenancePattern: 'maintenance',
                    swimMaintenanceStart: null,
                    strengthMaintenanceStart: null,
                    sessions: [],
                    nutrition: {
                        breakfastCals: 400, breakfastTime: '07:00',
                        snack1Cals: 200, snack1Time: '10:00',
                        lunchCals: 600, lunchTime: '12:30',
                        snack2Cals: 200, snack2Time: '16:00',
                        dinnerCals: 600, dinnerTime: '19:00'
                    }
                };
            }

            loadData() {
                const defaults = this.defaultData();
                const saved = localStorage.getItem('workoutData');
                if (!saved) return defaults;
                let parsed;
                try {
                    parsed = JSON.parse(saved);
                } catch {
                    return defaults;
                }
                const data = Object.assign({}, defaults, parsed);
                data.nutrition = Object.assign({}, defaults.nutrition, parsed.nutrition || {});
                if (!Array.isArray(data.sessions)) data.sessions = [];
                return data;
            }

            saveData() {
                localStorage.setItem('workoutData', JSON.stringify(this.data));
            }

            getCurrentWeekNumber() {
                const start = new Date(this.data.programStart);
                const now = new Date();
                const diffDays = Math.floor((now - start) / (1000 * 60 * 60 * 24));
                return Math.max(1, 1 + Math.floor(diffDays / 7));
            }

            // ---------- DISPLAY WEEK / LEVEL (program is decoupled from calendar) ----------

            getDisplaySwimWeek() {
                if (!this.data.swimReachedWeek20) {
                    return Math.min(Math.max(this.data.swimProgramWeek || 1, 1), 20);
                }
                const start = this.data.swimMaintenanceStart || this.getCurrentWeekNumber();
                const cur = this.getCurrentWeekNumber();
                if (cur < start) return 20; // remainder of the finish week: show week 20, rotation starts next week
                const off = cur - start;
                switch (this.data.swimMaintenancePattern) {
                    case 'retention':
                        return Math.floor(off / 2) % 2 === 0 ? 20 : 7;
                    case 'buildback':
                        return 16 + (off % 5);
                    default:
                        return 20;
                }
            }

            getDisplayStrengthLevel() {
                if (!this.data.strengthReachedWeek20) {
                    return Math.min(Math.max(this.data.currentStrengthLevel || 0, 0), 20);
                }
                const start = this.data.strengthMaintenanceStart || this.getCurrentWeekNumber();
                const cur = this.getCurrentWeekNumber();
                if (cur < start) return 20; // remainder of the finish week: show level 20, rotation starts next week
                const off = cur - start;
                switch (this.data.strengthMaintenancePattern) {
                    case 'retention':
                        return Math.floor(off / 2) % 2 === 0 ? 20 : 10;
                    case 'buildback':
                        return 16 + (off % 5);
                    default:
                        return 20;
                }
            }

            // ---------- SESSION LOOKUP ----------

            findSwimSession(slot) {
                if (!this.data.swimReachedWeek20) {
                    const w = this.data.swimProgramWeek;
                    return this.data.sessions.find(s =>
                        s.type === 'swim' && s.slot === slot && s.programWeek === w && !s.maintenance
                    );
                }
                const cw = this.getCurrentWeekNumber();
                return this.data.sessions.find(s =>
                    s.type === 'swim' && s.slot === slot && s.calendarWeek === cw && s.maintenance
                );
            }

            findTodayStrengthSession() {
                const today = new Date().toDateString();
                return this.data.sessions.find(s =>
                    s.type === 'strength' && new Date(s.date).toDateString() === today
                );
            }

            // ---------- LOGGING + PROGRESSION ----------

            logSwimSession(slot, completed) {
                const existing = this.findSwimSession(slot);
                if (existing) {
                    existing.completed = completed;
                } else {
                    this.data.sessions.push({
                        type: 'swim',
                        slot: slot,
                        programWeek: this.getDisplaySwimWeek(),
                        calendarWeek: this.getCurrentWeekNumber(),
                        maintenance: this.data.swimReachedWeek20,
                        completed: completed,
                        date: new Date().toISOString()
                    });
                }

                if (!this.data.swimReachedWeek20) {
                    this.checkSwimAdvancement();
                }

                this.saveData();
                this.render();
            }

            checkSwimAdvancement() {
                const w = this.data.swimProgramWeek;
                const wedDone = this.data.sessions.some(s =>
                    s.type === 'swim' && s.slot === 'wed' && s.programWeek === w && !s.maintenance && s.completed
                );
                const friDone = this.data.sessions.some(s =>
                    s.type === 'swim' && s.slot === 'fri' && s.programWeek === w && !s.maintenance && s.completed
                );

                if (wedDone && friDone) {
                    if (w >= 20) {
                        this.data.swimReachedWeek20 = true;
                        // Pattern rotation formally begins at the start of NEXT calendar week
                        this.data.swimMaintenanceStart = this.getCurrentWeekNumber() + 1;
                        this.justFinishedSwim = true;
                    } else {
                        this.data.swimProgramWeek = w + 1;
                    }
                }
            }

            logStrengthSession(completed) {
                let s = this.findTodayStrengthSession();
                if (s) {
                    if (completed && !s.completed && !s.advanced) {
                        s.completed = true;
                        this.advanceStrength(s);
                    } else if (!completed) {
                        s.completed = false;
                    }
                } else {
                    s = {
                        type: 'strength',
                        programLevel: this.getDisplayStrengthLevel(),
                        calendarWeek: this.getCurrentWeekNumber(),
                        maintenance: this.data.strengthReachedWeek20,
                        completed: completed,
                        advanced: false,
                        date: new Date().toISOString()
                    };
                    this.data.sessions.push(s);
                    if (completed) {
                        this.advanceStrength(s);
                    }
                }

                this.saveData();
                this.render();
            }

            advanceStrength(session) {
                session.advanced = true;
                if (this.data.strengthReachedWeek20) return;

                if (this.data.currentStrengthLevel >= 20) {
                    this.data.strengthReachedWeek20 = true;
                    // Pattern rotation formally begins at the start of NEXT calendar week
                    this.data.strengthMaintenanceStart = this.getCurrentWeekNumber() + 1;
                    this.justFinishedStrength = true;
                } else {
                    this.data.currentStrengthLevel += 1;
                }
            }

                    3: { wed: { type: 'Longer Endurance', total: '2700m', time: '~58 min', sections: [{ name: 'Warm-up (900m)', distance: '900m', details: ['600m swim', '200m kick', '100m pull'] }, { name: 'Drills (250m)', distance: '250m', details: ['5x50m fingertip drag'] }, { name: 'Main Set (1350m)', distance: '1350m', details: ['1350m continuous @ 70%', 'Slightly faster than Week 2'] }, { name: 'Cool-down (200m)', distance: '200m', details: ['200m easy'] }] }, fri: { type: 'Interval Progression', total: '2800m', time: '~60 min', sections: [{ name: 'Warm-up (900m)', distance: '900m', details: ['500m swim', '200m kick', '200m pull'] }, { name: 'Drills (200m)', distance: '200m', details: ['4x50m high elbow catch'] }, { name: 'Main Set (1500m)', distance: '1500m', details: ['5x200m @ 4:10 (base + 10 sec)', '70% effort', 'Rest 70 sec'] }, { name: 'Cool-down (200m)', distance: '200m', details: ['200m easy'] }] } },

                };

                // Weeks 13-20 = second cycle of weeks 5-12, swum at slightly higher effort.
                // Week 15 = recovery (from 7), week 18 = recovery (from 10), week 20 = peak (from 12).
                for (let w = 13; w <= 20; w++) {
                    const src = programs[w - 8];
                    const copy = JSON.parse(JSON.stringify(src));
                    copy.wed.type += ' - Cycle 2';
                    copy.fri.type += ' - Cycle 2';
                    copy.wed.sections.forEach(sec => {

                            sec.details.push('Cycle 2: aim slightly faster than first time through');
                        }
                    });
                    programs[w] = copy;
                }

                return programs;
            }

            // ---------- OVERRIDE + PATTERNS ----------

            openModal(modalId) {
                const el = document.getElementById(modalId);
                if (el) el.classList.add('active');
            }

            closeModal(modalId) {
                const el = document.getElementById(modalId);
                if (el) el.classList.remove('active');
            }

            handleOverride() {
                const swimVal = document.getElementById('overrideSwimWeek').value;
                const strVal = document.getElementById('overrideStrengthLevel').value;

                if (swimVal !== 'stay') {
                    const w = parseInt(swimVal);
                    if (!isNaN(w)) {
                        this.data.swimProgramWeek = Math.min(Math.max(w, 1), 20);
                        this.data.swimReachedWeek20 = false;
                        this.data.swimMaintenanceStart = null;
                    }
                }

                if (strVal !== 'stay') {
                    const l = parseInt(strVal);
                    if (!isNaN(l)) {
                        this.data.currentStrengthLevel = Math.min(Math.max(l, 0), 20);
                        this.data.strengthReachedWeek20 = false;
                        this.data.strengthMaintenanceStart = null;
                    }
                }

                this.saveData();
                this.closeModal('overrideModal');
                this.render();
            }

            selectMaintenancePattern(type, pattern) {
                const cur = this.getCurrentWeekNumber();
                if (type === 'swim') {
                    this.data.swimMaintenancePattern = pattern;
                    // Re-anchor: the new pattern starts this week - but never earlier
                    // than the scheduled start (covers picking a pattern during the finish week)
                    this.data.swimMaintenanceStart = Math.max(cur, this.data.swimMaintenanceStart || cur);
                } else {
                    this.data.strengthMaintenancePattern = pattern;
                    this.data.strengthMaintenanceStart = Math.max(cur, this.data.strengthMaintenanceStart || cur);
                }
                this.saveData();
                this.render();
                // render() rebuilds the page, which closes every modal. Reopen this one so the
                // selection is visibly marked (active) and the user closes it with Done.
                this.openModal(type === 'swim' ? 'swimMaintenanceModal' : 'strengthMaintenanceModal');
            }

            // ---------- RENDERING ----------

            renderHeader() {
                const week = this.getCurrentWeekNumber();
                const swimLabel = this.data.swimReachedWeek20
                    ? 'Maintenance (' + this.data.swimMaintenancePattern + ')'
                    : 'Week ' + this.getDisplaySwimWeek();
                const strLabel = this.data.strengthReachedWeek20
                    ? 'Maintenance (' + this.data.strengthMaintenancePattern + ')'
                    : 'Level ' + this.getDisplayStrengthLevel();

                return `
                    <div class="header">
                        <h1>Workout Tracker v6</h1>
                        <div class="header-info">
                            <div class="info-item"><span>Calendar Week</span><span class="info-value">${week}</span></div>
                            <div class="info-item"><span>Swim Program</span><span class="info-value">${swimLabel}</span></div>
                            <div class="info-item"><span>Strength Program</span><span class="info-value">${strLabel}</span></div>
                            <div class="info-item"><span>Weight</span><span class="info-value">${this.data.userWeight || '-'} kg</span></div>
                        </div>
                    </div>
                `;
            }

            renderOverrideSection() {
                let banners = '';
                if (this.data.swimReachedWeek20) {
                    banners += `<div class="warning-banner">Swimming: 20-week program completed. Maintenance pattern: <strong>${this.data.swimMaintenancePattern}</strong> (currently showing week ${this.getDisplaySwimWeek()}).</div>`;
                }
                if (this.data.strengthReachedWeek20) {
                    banners += `<div class="warning-banner">Strength: 20-level program completed. Maintenance pattern: <strong>${this.data.strengthMaintenancePattern}</strong> (currently showing level ${this.getDisplayStrengthLevel()}).</div>`;
                }

                return `
                    <div class="card">
                        <h2>Program Control</h2>
                        ${banners}
                        <button class="override-btn" onclick="window.app.openModal('overrideModal')">
                            Override Swim Week / Strength Level
                        </button>
                        <p style="font-size: 0.85rem; color: var(--text-dim);">
                            Programs advance only when you complete sessions, never by calendar.
                            Overriding while in maintenance mode returns that program to normal progression.
                        </p>
                    </div>
                `;
            }

            renderOverrideModal() {
                let swimOptions = '';
                if (this.data.swimReachedWeek20) {
                    swimOptions += `<option value="stay" selected>(Stay in maintenance)</option>`;
                }
                for (let i = 1; i <= 20; i++) {
                    const selected = (!this.data.swimReachedWeek20 && i === this.data.swimProgramWeek) ? 'selected' : '';
                    swimOptions += `<option value="${i}" ${selected}>Week ${i}</option>`;
                }

                let strOptions = '';
                if (this.data.strengthReachedWeek20) {
                    strOptions += `<option value="stay" selected>(Stay in maintenance)</option>`;
                }
                for (let i = 0; i <= 20; i++) {
                    const selected = (!this.data.strengthReachedWeek20 && i === this.data.currentStrengthLevel) ? 'selected' : '';
                    strOptions += `<option value="${i}" ${selected}>Level ${i}</option>`;
                }

                return `
                    <div class="modal" id="overrideModal">
                        <div class="modal-content">
                            <h3>Override Programs</h3>
                            <div class="form-group">
                                <label>Swim Program Week</label>
                                <select id="overrideSwimWeek">${swimOptions}</select>
                            </div>
                            <div class="form-group">
                                <label>Strength Level</label>
                                <select id="overrideStrengthLevel">${strOptions}</select>
                            </div>
                            <div class="modal-buttons">
                                <button class="btn btn-sm modal-close" onclick="window.app.closeModal('overrideModal')">Cancel</button>
                                <button class="btn btn-sm btn-primary" onclick="window.app.handleOverride()">Apply</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderPatternModal(type) {
                const isSwim = type === 'swim';
                const reached = isSwim ? this.data.swimReachedWeek20 : this.data.strengthReachedWeek20;
                if (!reached) return '';

                const current = isSwim ? this.data.swimMaintenancePattern : this.data.strengthMaintenancePattern;
                const modalId = isSwim ? 'swimMaintenanceModal' : 'strengthMaintenanceModal';
                const title = isSwim ? 'Swimming Maintenance Pattern' : 'Strength Maintenance Pattern';
                const hard = isSwim ? 'Week 20' : 'Level 20';
                const easy = isSwim ? 'Week 7 (recovery)' : 'Level 10 (easier)';
                const range = isSwim ? 'weeks 16-20' : 'levels 16-20';

                const card = (key, name, desc) => `
                    <div class="pattern-card ${current === key ? 'selected' : ''}" onclick="window.app.selectMaintenancePattern('${type}', '${key}')">
                        <div class="pattern-name">${name} ${current === key ? '(active)' : ''}</div>
                        <div class="pattern-desc">${desc}</div>
                    </div>
                `;

                return `
                    <div class="modal" id="${modalId}">
                        <div class="modal-content">
                            <h3>${title}</h3>
                            <p style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 1rem;">
                                You completed the 20-week program. Choose how to continue indefinitely.
                                The rotation begins at the start of next calendar week. Switching
                                patterns later restarts the rotation from the week you switch.
                            </p>
                            ${card('maintenance', 'Maintenance', 'Repeat ' + hard + ' every week. Hold your peak.')}
                            ${card('retention', 'Retention', 'Alternate 2 weeks of ' + hard + ' with 2 weeks of ' + easy + '. Sustainable long-term.')}
                            ${card('buildback', 'Build Back', 'Cycle through ' + range + ', one per week, then repeat. Variety in the peak range.')}
                            <div class="modal-buttons">
                                <button class="btn btn-sm btn-primary" onclick="window.app.closeModal('${modalId}')">Done</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            swimStatusButtons(slot) {
                const s = this.findSwimSession(slot);
                const doneCls = s && s.completed ? 'status-completed' : 'status-inactive';
                const skipCls = s && !s.completed ? 'status-skipped' : 'status-inactive';
                return `
                    <button class="session-status ${doneCls}" onclick="window.app.logSwimSession('${slot}', true)">Completed</button>
                    <button class="session-status ${skipCls}" onclick="window.app.logSwimSession('${slot}', false)">Skipped</button>
                `;
            }

            renderSwimmingCard() {
                const program = this.getSwimmingProgram();
                const week = this.getDisplaySwimWeek();

                let title = 'Swimming - Week ' + week;
                let patternBtn = '';
                if (this.data.swimReachedWeek20) {
                    title = 'Swimming - Maintenance (week ' + week + ' workout)';
                    patternBtn = `<p style="margin-bottom: 1rem;"><button class="btn btn-secondary btn-sm" onclick="window.app.openModal('swimMaintenanceModal')">Change Pattern</button></p>`;
                }

                const renderDay = (day, label, tabId) => `
                    <div class="program-view">
                        <h4>${day.type}</h4>
                        <p style="font-size: 0.9rem; color: var(--text-dim); margin-bottom: 1rem;">${day.total} | ${day.time}</p>
                        ${day.sections.map(section => `
                            <div class="program-section">
                                <div class="section-name">${section.name}</div>
                                <div class="section-details">
                                    ${section.details.map(d => `<div>- ${d}</div>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="session-row">
                        <span class="session-label">${label} Session</span>
                        ${this.swimStatusButtons(tabId)}
                    </div>
                `;

                return `
                    <div class="card">
                        <h2>${title}</h2>
                        ${patternBtn}
                        <div class="tabs">
                            <button class="tab-btn active" id="tabBtnWed" onclick="window.app.showSwimTab('wed')">Wednesday</button>
                            <button class="tab-btn" id="tabBtnFri" onclick="window.app.showSwimTab('fri')">Friday</button>
                        </div>
                        <div id="swimWed" class="tab-content active">
                            ${renderDay(program.wed, 'Wednesday', 'wed')}
                        </div>
                        <div id="swimFri" class="tab-content">
                            ${renderDay(program.fri, 'Friday', 'fri')}
                        </div>
                    </div>
                `;
            }

            showSwimTab(slot) {
                this.activeSwimTab = slot;
                document.getElementById('swimWed').classList.toggle('active', slot === 'wed');
                document.getElementById('swimFri').classList.toggle('active', slot === 'fri');
                document.getElementById('tabBtnWed').classList.toggle('active', slot === 'wed');
                document.getElementById('tabBtnFri').classList.toggle('active', slot === 'fri');
            }

            renderStrengthCard() {
                const program = this.getStrengthProgram();
                const level = this.getDisplayStrengthLevel();
                const s = this.findTodayStrengthSession();
                const doneCls = s && s.completed ? 'status-completed' : 'status-inactive';
                const skipCls = s && !s.completed ? 'status-skipped' : 'status-inactive';

                let title = 'Strength - Level ' + level;
                let patternBtn = '';
                if (this.data.strengthReachedWeek20) {
                    title = 'Strength - Maintenance (level ' + level + ' workout)';
                    patternBtn = `<p style="margin-bottom: 1rem;"><button class="btn btn-secondary btn-sm" onclick="window.app.openModal('strengthMaintenanceModal')">Change Pattern</button></p>`;
                }

                return `
                    <div class="card">
                        <h2>${title}</h2>
                        ${patternBtn}
                        <div class="program-view">
                            <h4>${program.name}</h4>
                            <p style="font-size: 0.9rem; color: var(--text-dim); margin-bottom: 1rem;">${program.rounds} rounds | ${program.restTime} rest</p>
                            ${program.exercises.map(ex => `
                                <div class="program-section">
                                    <div class="section-name">${ex.name}</div>
                                    <div class="section-distance">${ex.reps}</div>
                                    <div class="section-details"><div>- ${ex.notes}</div></div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="session-row">
                            <span class="session-label">This week's session (completing it advances one level)</span>
                            <button class="session-status ${doneCls}" onclick="window.app.logStrengthSession(true)">Completed</button>
                            <button class="session-status ${skipCls}" onclick="window.app.logStrengthSession(false)">Skipped</button>
                        </div>
                    </div>
                `;
            }

            renderNutritionCard() {
                const n = this.data.nutrition;
                const total = n.breakfastCals + n.snack1Cals + n.lunchCals + n.snack2Cals + n.dinnerCals;
                const box = (label, cals, time) => `
                    <div class="stat-box">
                        <div style="font-size: 0.9rem; margin-bottom: 0.5rem;">${label}</div>
                        <div class="stat-value">${cals}</div>
                        <div class="stat-label">${time}</div>
                    </div>
                `;
                return `
                    <div class="card">
                        <h2>Nutrition Guide</h2>
                        <div class="stat-grid">
                            ${box('Breakfast', n.breakfastCals, n.breakfastTime)}
                            ${box('Snack 1', n.snack1Cals, n.snack1Time)}
                            ${box('Lunch', n.lunchCals, n.lunchTime)}
                            ${box('Snack 2', n.snack2Cals, n.snack2Time)}
                            ${box('Dinner', n.dinnerCals, n.dinnerTime)}
                            ${box('Daily Total', total, 'kcal/day')}
                        </div>
                    </div>
                `;
            }

            renderProgressCard() {
                const sessions = this.data.sessions;
                const total = sessions.length;
                const completed = sessions.filter(s => s.completed).length;
                const swim = sessions.filter(s => s.type === 'swim').length;
                const strength = sessions.filter(s => s.type === 'strength').length;
                const rate = total > 0 ? Math.round((completed / total) * 100) : 0;

                return `
                    <div class="card">
                        <h2>Progress</h2>
                        <div class="stat-grid">
                            <div class="stat-box"><div class="stat-value">${rate}%</div><div class="stat-label">Completion Rate</div></div>
                            <div class="stat-box"><div class="stat-value">${completed}</div><div class="stat-label">Completed</div></div>
                            <div class="stat-box"><div class="stat-value">${swim}</div><div class="stat-label">Swim Sessions</div></div>
                            <div class="stat-box"><div class="stat-value">${strength}</div><div class="stat-label">Strength Sessions</div></div>
                        </div>
                    </div>
                `;
            }

            renderDataCard() {
                return `
                    <div class="card">
                        <h2>Data Management</h2>
                        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                            <button class="btn btn-secondary btn-sm" onclick="window.app.exportData()">Export Data</button>
                            <button class="btn btn-secondary btn-sm" onclick="window.app.importData()">Import Data</button>
                            <button class="btn btn-secondary btn-sm" onclick="if(confirm('Reset ALL data? This cannot be undone.')) { window.app.resetData(); }">Reset All</button>
                        </div>
                    </div>
                `;
            }

            exportData() {
                const dataStr = JSON.stringify(this.data, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'workout_data.json';
                a.click();
                URL.revokeObjectURL(url);
            }

            importData() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'application/json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const imported = JSON.parse(event.target.result);
                            localStorage.setItem('workoutData', JSON.stringify(imported));
                            this.data = this.loadData();
                            this.saveData();
                            this.render();
                            alert('Data imported successfully');
                        } catch {
                            alert('Failed to import data');
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }

            resetData() {
                localStorage.removeItem('workoutData');
                this.data = this.loadData();
                this.render();
            }

            render() {
                if (!this.data.userWeight) {
                    document.getElementById('app').innerHTML = `
                        <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
                            <div class="card" style="max-width: 400px; width: 100%;">
                                <h2 style="margin-bottom: 1rem;">Welcome</h2>
                                <div class="form-group">
                                    <label>Enter Your Weight (kg)</label>
                                    <input type="number" id="weightInput" placeholder="e.g., 82">
                                </div>
                                <button class="btn btn-primary" style="width: 100%;" onclick="window.app.setWeight(parseInt(document.getElementById('weightInput').value))">Start Training</button>
                            </div>
                        </div>
                    `;
                    return;
                }

                document.getElementById('app').innerHTML = `
                    ${this.renderHeader()}
                    ${this.renderOverrideSection()}
                    ${this.renderSwimmingCard()}
                    ${this.renderStrengthCard()}
                    ${this.renderNutritionCard()}
                    ${this.renderProgressCard()}
                    ${this.renderDataCard()}
                    ${this.renderOverrideModal()}
                    ${this.renderPatternModal('swim')}
                    ${this.renderPatternModal('strength')}
                `;

                if (this.activeSwimTab === 'fri') {
                    this.showSwimTab('fri');
                }

                if (this.justFinishedSwim) {
                    this.justFinishedSwim = false;
                    this.openModal('swimMaintenanceModal');
                }
                if (this.justFinishedStrength) {
                    this.justFinishedStrength = false;
                    this.openModal('strengthMaintenanceModal');
                }
            }

            setWeight(weight) {
                if (weight && weight > 0) {
                    this.data.userWeight = weight;
                    this.saveData();
                    this.render();
                } else {
                    alert('Please enter a valid weight');
                }
            }
        }

        window.app = new WorkoutApp();
    </script>
</body>
</html>
