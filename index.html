<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏊 Workout Scheduler V4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2d5016;
            --accent: #d4af37;
            --light: #4a7c2c;
            --gray: #f8f9fa;
            --dark: #2c3e50;
            --success: #27ae60;
            --border: #dee2e6;
            --warn: #f39c12;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray);
            color: var(--dark);
            line-height: 1.6;
            padding-bottom: 2rem;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 1rem; }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--light) 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }
        .header .info { font-size: 0.95rem; opacity: 0.95; }
        .card { background: white; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h2 { color: var(--primary); font-size: 1.25rem; margin-bottom: 1rem; }
        .btn { display: block; padding: 0.75rem; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; width: 100%; text-align: center; transition: all 0.2s; }
        .btn-gold { background: var(--accent); color: var(--dark); }
        .btn-gold:hover { background: #c9a52b; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--light); }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 0.75rem; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; padding: 1rem; overflow-y: auto; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 2rem; }
        .modal-content { background: white; border-radius: 12px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal-header { background: var(--primary); color: white; padding: 1.25rem; border-radius: 12px 12px 0 0; font-size: 1.25rem; display: flex; justify-content: space-between; }
        .modal-body { padding: 1.5rem; }
        .modal-close { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .stat-box { text-align: center; padding: 1rem; background: var(--gray); border-radius: 8px; }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 0.875rem; color: #6c757d; margin-top: 0.5rem; }
        .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border-left: 4px solid #3498db; background: rgba(52, 152, 219, 0.1); }
        .workout-detail { padding: 0.5rem 0; line-height: 1.6; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; }
    </style>
</head>
<body>
    <div id="app"></div>
 
    <script>
        // SWIMMING PROGRAMS - Weeks 1-20
        const SWIM = {
            1: { wed: { drill: "Catch-up drill (4×50m)", type: "Endurance Base", dist: "2500m", time: "55min", sets: ["WU: 1000m (500 swim, 200 kick, 300 pull)", "Drills: 4×50 Catch-up", "Main: 800m @ 70%", "CD: 200m easy"] }, fri: { drill: "Side kick (4×50m)", type: "Base Intervals", dist: "2600m", time: "57min", sets: ["WU: 1000m", "Drills: 2×50 left, 2×50 right side kick", "Main: 10×100 @ 2:05", "CD: 200m"] } },
            2: { wed: { drill: "6-kick switch (4×50m)", type: "Longer Endurance", dist: "2600m", time: "57min", sets: ["WU: 1000m", "Drills: 4×50 6-kick switch", "Main: 1000m @ 70%", "CD: 200m"] }, fri: { drill: "Fingertip drag (4×50m)", type: "Base Intervals", dist: "2700m", time: "58min", sets: ["WU: 1000m", "Drills: 4×50 Fingertip drag", "Main: 12×100 @ 2:00", "CD: 200m"] } },
            3: { wed: { drill: "Fist drill (4×50m)", type: "Steady State", dist: "2700m", time: "59min", sets: ["WU: 1000m", "Drills: 4×50 Fist drill", "Main: 1200m @ 70%", "CD: 200m"] }, fri: { drill: "Kick on side + pull (4×50m)", type: "Longer Intervals", dist: "2800m", time: "60min", sets: ["WU: 1000m", "Drills: 4×50 Kick on side + arm pulls", "Main: 8×150 @ 3:00", "CD: 200m"] } },
            4: { wed: { drill: "Catch-up drill (4×50m)", type: "Steady State", dist: "2700m", time: "59min", sets: ["WU: 1000m", "Drills: 4×50 Catch-up", "Main: 1200m @ 70%", "CD: 200m"] }, fri: { drill: "Side kick (4×50m)", type: "Longer Intervals", dist: "2800m", time: "60min", sets: ["WU: 1000m", "Drills: 4×50 Side kick", "Main: 8×150 @ 3:00", "CD: 200m"] } },
            5: { wed: { drill: "High elbow catch (4×50m)", type: "Longer Endurance", dist: "2800m", time: "60min", sets: ["WU: 1000m", "Drills: 4×50 High elbow catch", "Main: 1300m @ 70-72%", "CD: 200m"] }, fri: { drill: "One-arm drill (4×50m each side)", type: "Mixed Intervals", dist: "2900m", time: "62min", sets: ["WU: 1000m", "Drills: 4×50 One-arm drill", "Main: 8×100 @ 2:00 + 5×150 @ 3:00", "CD: 200m"] } },
            6: { wed: { drill: "Fist drill (4×50m)", type: "Longer Endurance", dist: "2800m", time: "60min", sets: ["WU: 1000m", "Drills: 4×50 Fist", "Main: 1300m @ 70-72%", "CD: 200m"] }, fri: { drill: "Sculling (4×50m)", type: "Mixed Intervals", dist: "2900m", time: "62min", sets: ["WU: 1000m", "Drills: 4×50 Sculling", "Main: 8×100 @ 2:00 + 5×150 @ 3:00", "CD: 200m"] } },
            7: { wed: { drill: "6-kick switch (4×50m)", type: "RECOVERY Endurance", dist: "2400m", time: "52min", sets: ["WU: 800m", "Drills: 4×50 6-kick switch", "Main: 1000m @ 65-70% EASY", "CD: 200m"] }, fri: { drill: "Catch-up drill (4×50m)", type: "RECOVERY Intervals", dist: "2500m", time: "54min", sets: ["WU: 800m", "Drills: 4×50 Catch-up", "Main: 10×100 @ 2:10 EASY", "CD: 200m"] } },
            8: { wed: { drill: "High elbow catch (4×50m)", type: "Endurance", dist: "2900m", time: "62min", sets: ["WU: 1000m", "Drills: 4×50 High elbow catch", "Main: 1400m @ 70%", "CD: 200m"] }, fri: { drill: "One-arm drill (4×50m)", type: "Longer Intervals", dist: "3000m", time: "64min", sets: ["WU: 1000m", "Drills: 4×50 One-arm", "Main: 6×200 @ 4:00", "CD: 200m"] } },
            9: { wed: { drill: "Fingertip drag (4×50m)", type: "Endurance", dist: "2900m", time: "62min", sets: ["WU: 1000m", "Drills: 4×50 Fingertip drag", "Main: 1400m @ 70%", "CD: 200m"] }, fri: { drill: "Fist drill (4×50m)", type: "Longer Intervals", dist: "3000m", time: "64min", sets: ["WU: 1000m", "Drills: 4×50 Fist drill", "Main: 6×200 @ 4:00", "CD: 200m"] } },
            10: { wed: { drill: "Side kick (4×50m)", type: "RECOVERY", dist: "2500m", time: "54min", sets: ["WU: 800m", "Drills: 4×50 Side kick", "Main: 1200m @ 65% RECOVERY", "CD: 200m"] }, fri: { drill: "6-kick switch (6×50m)", type: "RECOVERY Technique", dist: "2600m", time: "56min", sets: ["WU: 800m", "Drills: 6×50 6-kick switch", "Main: 10×100 @ 2:15", "CD: 200m"] } },
            11: { wed: { drill: "High elbow catch (4×50m)", type: "PEAK Long Endurance", dist: "3000m", time: "64min", sets: ["WU: 1000m", "Drills: 4×50 High elbow catch", "Main: 1500m @ 70-72% PEAK", "CD: 200m"] }, fri: { drill: "Sculling (4×50m)", type: "PEAK Quality", dist: "3000m", time: "64min", sets: ["WU: 1000m", "Drills: 4×50 Sculling", "Main: 10×150 @ 2:57 SPEED", "CD: 200m"] } },
            12: { wed: { drill: "Catch-up drill (4×50m)", type: "TAPER", dist: "2600m", time: "56min", sets: ["WU: 800m", "Drills: 4×50 Catch-up", "Main: 1200m @ 70%", "CD: 200m"] }, fri: { drill: "One-arm drill (4×50m)", type: "TAPER Speed", dist: "2700m", time: "58min", sets: ["WU: 1000m", "Drills: 4×50 One-arm", "Main: 5×200 @ 4:00 + 4×50 @ 1:00 SPEED", "CD: 200m"] } }
        };
 
        // Add weeks 13-20 (repeat cycle with drill rotation)
        for (let w = 13; w <= 20; w++) {
            const baseW = 1 + ((w - 13) % 12);
            SWIM[w] = JSON.parse(JSON.stringify(SWIM[baseW]));
        }
 
        // STRENGTH PROGRAMS - Levels 0-15
        const STR = {
            0: { name: "Baseline", time: "50min", rounds: 3, rest: "90sec", ex: [
                { e: "Diamond Push-ups", r: "10", n: "If easy: feet elevated" },
                { e: "Bulgarian Split Squats (2×4kg)", r: "10 each", n: "Dumbbells at sides" },
                { e: "Pull-ups", r: "5", n: "Full ROM" },
                { e: "Lateral Lunges (2×4kg)", r: "8 each", n: "NEW: dumbbell replacement" },
                { e: "Hollow Body Hold", r: "30sec", n: "NEW: L-sit replacement" },
                { e: "Plank", r: "45sec", n: "Maintain" }
            ]},
            1: { name: "Progress", time: "50min", rounds: 3, rest: "90sec", ex: [
                { e: "Diamond Push-ups", r: "10", n: "" },
                { e: "Bulgarian Split Squats (2×4kg)", r: "10 each", n: "" },
                { e: "Pull-ups", r: "5", n: "" },
                { e: "Lateral Lunges (2×4kg)", r: "8 each", n: "" },
                { e: "Hollow Body Hold", r: "30sec", n: "" },
                { e: "Plank", r: "45sec", n: "" }
            ]},
            2: { name: "Progress+", time: "52min", rounds: 3, rest: "90sec", ex: [
                { e: "Decline Push-ups", r: "8", n: "Feet on chair" },
                { e: "Assisted Pistol Squats", r: "6 each", n: "OR Goblet: 2×4kg" },
                { e: "Pull-ups", r: "6", n: "One more rep" },
                { e: "Lateral Lunges (2×4kg)", r: "10 each", n: "Progression" },
                { e: "Hollow Body Hold", r: "45sec", n: "Progress to tuck" },
                { e: "Tuck Hold (on bar)", r: "10sec", n: "OR Knee raises: 8" }
            ]},
            3: { name: "Progress++", time: "52min", rounds: 3, rest: "90sec", ex: [
                { e: "Decline Push-ups", r: "8", n: "" },
                { e: "Assisted Pistol Squats", r: "6 each", n: "" },
                { e: "Pull-ups", r: "6", n: "" },
                { e: "Lateral Lunges (2×4kg)", r: "10 each", n: "" },
                { e: "Hollow Body Hold", r: "45sec", n: "" },
                { e: "Tuck Hold", r: "10sec", n: "" }
            ]},
            4: { name: "Build", time: "55min", rounds: 3, rest: "90sec", ex: [
                { e: "Pseudo Planche Push-ups", r: "6", n: "Hands by hips, lean" },
                { e: "Pistol Squat Negatives", r: "5 each", n: "Lower slowly" },
                { e: "Pull-ups", r: "7", n: "Volume work" },
                { e: "Lateral Lunges (2×4kg)", r: "12 each", n: "Slower tempo" },
                { e: "Dips on Chair", r: "6", n: "NEW: Nordic curl replacement" },
                { e: "Hollow Body Hold", r: "60sec", n: "Core strength" }
            ]},
            5: { name: "Build+", time: "55min", rounds: 3, rest: "90sec", ex: [
                { e: "Pseudo Planche Push-ups", r: "6", n: "" },
                { e: "Pistol Squat Negatives", r: "5 each", n: "" },
                { e: "Pull-ups", r: "7", n: "" },
                { e: "Lateral Lunges (2×4kg)", r: "12 each", n: "" },
                { e: "Dips on Chair", r: "6", n: "" },
                { e: "Hollow Body Hold", r: "60sec", n: "" }
            ]},
            6: { name: "DELOAD - Active Recovery", time: "40min", rounds: 2, rest: "2min", ex: [
                { e: "Regular Push-ups", r: "15", n: "Easy baseline" },
                { e: "Bodyweight Squats", r: "20", n: "" },
                { e: "Pull-ups", r: "3", n: "Sub-max" },
                { e: "Hollow Body Hold", r: "20sec", n: "" },
                { e: "Plank", r: "30sec", n: "" }
            ]},
            7: { name: "Advanced", time: "55min", rounds: 3, rest: "90sec", ex: [
                { e: "Archer Push-ups", r: "5 each", n: "One arm more work" },
                { e: "Pistol Squats", r: "5 each", n: "Full ROM, controlled" },
                { e: "Weighted Pull-ups", r: "5", n: "4kg dumbbell" },
                { e: "Lateral Lunges (2×4kg)", r: "12 each", n: "Dynamic" },
                { e: "Dips on Chair", r: "8", n: "Building strength" },
                { e: "Hollow Body Rocks", r: "15", n: "Explosive core" }
            ]},
            8: { name: "Advanced+", time: "55min", rounds: 3, rest: "90sec", ex: [
                { e: "Archer Push-ups", r: "5 each", n: "" },
                { e: "Pistol Squats", r: "5 each", n: "" },
                { e: "Weighted Pull-ups", r: "5", n: "4kg" },
                { e: "Lateral Lunges (2×4kg)", r: "12 each", n: "" },
                { e: "Dips on Chair", r: "8", n: "" },
                { e: "Hollow Body Rocks", r: "15", n: "" }
            ]},
            9: { name: "DELOAD - Recovery", time: "40min", rounds: 2, rest: "2min", ex: [
                { e: "Regular Push-ups", r: "15", n: "" },
                { e: "Bodyweight Squats", r: "20", n: "" },
                { e: "Pull-ups", r: "3", n: "" },
                { e: "Hollow Body Hold", r: "20sec", n: "" },
                { e: "Plank", r: "30sec", n: "" }
            ]},
            10: { name: "Peak Strength", time: "58min", rounds: 3, rest: "90sec", ex: [
                { e: "One-Arm Push-up Progression", r: "3 each", n: "Assisted light touch" },
                { e: "Pistol Squats (assisted)", r: "6 each", n: "Light touch balance" },
                { e: "Weighted Pull-ups", r: "6", n: "4kg" },
                { e: "Explosive Pull-ups", r: "3", n: "Pull fast, control down" },
                { e: "Lateral Lunges (2×4kg)", r: "12 each", n: "Explosive, balanced" },
                { e: "Dips on Chair", r: "10", n: "Max strength endurance" }
            ]},
            11: { name: "Peak+", time: "58min", rounds: 3, rest: "90sec", ex: [
                { e: "One-Arm Push-up Prog", r: "3 each", n: "" },
                { e: "Pistol Squats (assisted)", r: "6 each", n: "" },
                { e: "Weighted Pull-ups", r: "6", n: "4kg" },
                { e: "Explosive Pull-ups", r: "3", n: "" },
                { e: "Lateral Lunges (2×4kg)", r: "12 each", n: "" },
                { e: "Dips on Chair", r: "10", n: "" }
            ]},
            12: { name: "Maintenance (W13-20)", time: "55min", rounds: 3, rest: "90sec", ex: [
                { e: "Archer Push-ups", r: "6 each", n: "Quality work" },
                { e: "Pistol Squats", r: "6 each", n: "Form, ROM focus" },
                { e: "Weighted Pull-ups", r: "6", n: "4kg" },
                { e: "Lateral Lunges (2×4kg)", r: "12 each", n: "Explosive" },
                { e: "Dips on Chair", r: "8-10", n: "Strength endurance" },
                { e: "Hollow Body Rocks", r: "15", n: "Core power" }
            ]},
            13: { name: "Skill Work (W14)", time: "55min", rounds: 3, rest: "90sec", ex: [
                { e: "One-Arm Push-up Prog", r: "4 each", n: "Progressive" },
                { e: "Pistol Squats", r: "6-8 each", n: "Full ROM" },
                { e: "Weighted Pull-ups", r: "6-8", n: "4kg" },
                { e: "Explosive Pull-ups", r: "3-5", n: "Power" },
                { e: "Lateral Lunges (2×4kg)", r: "12 each", n: "Dynamic" },
                { e: "Dips on Chair", r: "10+", n: "Strength endurance" }
            ]},
            14: { name: "Skill Work (W15)", time: "55min", rounds: 3, rest: "90sec", ex: [
                { e: "One-Arm Push-up Prog", r: "4 each", n: "" },
                { e: "Pistol Squats", r: "6-8 each", n: "" },
                { e: "Weighted Pull-ups", r: "6-8", n: "" },
                { e: "Explosive Pull-ups", r: "3-5", n: "" },
                { e: "Lateral Lunges (2×4kg)", r: "12 each", n: "" },
                { e: "Dips on Chair", r: "10+", n: "" }
            ]},
            15: { name: "Skill Work (W16-20)", time: "55min", rounds: 3, rest: "90sec", ex: [
                { e: "One-Arm Push-up Prog", r: "4-5 each", n: "Continued progression" },
                { e: "Pistol Squats", r: "6-8 each", n: "Mastery phase" },
                { e: "Weighted Pull-ups", r: "6-8", n: "4kg" },
                { e: "Explosive Pull-ups", r: "3-5", n: "Power development" },
                { e: "Lateral Lunges (2×4kg)", r: "12 each", n: "Explosive, dynamic" },
                { e: "Dips on Chair", r: "10-12", n: "Strength endurance" }
            ]}
        };
 
        class App {
            constructor() {
                this.data = this.loadData();
                this.render();
            }
 
            loadData() {
                const s = localStorage.getItem('workoutData');
                return s ? JSON.parse(s) : {
                    setupComplete: false,
                    programStart: null,
                    currentStrengthLevel: 2,
                    swimProgramWeek: 7,
                    stats: {},
                    sessions: []
                };
            }
 
            saveData() {
                localStorage.setItem('workoutData', JSON.stringify(this.data));
            }
 
            getCurrentWeek() {
                if (!this.data.programStart) return 1;
                const now = new Date(), monday = new Date(now);
                monday.setDate(now.getDate() - (now.getDay() || 7) + 1);
                const start = new Date(this.data.programStart);
                const diff = Math.floor((monday - start) / (7 * 24 * 60 * 60 * 1000));
                return Math.min(Math.max(1 + diff, 1), 20);
            }
 
            render() {
                const app = document.getElementById('app');
                if (!this.data.setupComplete) {
                    app.innerHTML = `
                        <div class="container">
                            <div class="card">
                                <h2 style="text-align: center;">🏊 Workout Scheduler V4</h2>
                                <p style="text-align: center; margin: 1rem 0; font-size: 0.95rem;">Complete weeks 1-20 with drills, exercises replacements & override control</p>
                                <div class="form-group">
                                    <label>Weight (kg)</label>
                                    <input type="number" id="weight" placeholder="e.g., 82">
                                </div>
                                <button class="btn btn-gold" onclick="app.handleSetup()">🚀 Start Training</button>
                            </div>
                        </div>
                    `;
                } else {
                    const w = this.getCurrentWeek();
                    app.innerHTML = `
                        <div class="container">
                            <div class="header">
                                <h1>🏊 Workout Scheduler V4</h1>
                                <div class="info">Week ${w} of 20 • Swim Week ${this.data.swimProgramWeek} • Strength Level ${this.data.currentStrengthLevel}</div>
                            </div>
 
                            <div class="card">
                                <h2>⚙️ Program Control</h2>
                                <button class="btn btn-outline" onclick="app.showOverride()" style="background: white; border: 2px solid var(--primary); color: var(--primary);">Override Swim Week / Strength Level</button>
                            </div>
 
                            <div class="card">
                                <h2>📊 Progress</h2>
                                <div class="grid">
                                    <div class="stat-box">
                                        <div class="stat-value">${this.data.sessions.filter(s => s.completed).length}</div>
                                        <div class="stat-label">Sessions Completed</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-value">${this.data.currentStrengthLevel}</div>
                                        <div class="stat-label">Strength Level</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-value">${this.data.swimProgramWeek}</div>
                                        <div class="stat-label">Swim Week</div>
                                    </div>
                                </div>
                            </div>
 
                            <div class="card">
                                <h2>💾 Actions</h2>
                                <button class="btn btn-primary" onclick="app.exportData()">Export Data</button>
                            </div>
 
                            <div class="card">
                                <h2>📋 This Week's Programs</h2>
                                <button class="btn btn-gold" style="margin-bottom: 0.75rem;" onclick="app.showSwimProgram()">🏊 View Swim (Week ${this.data.swimProgramWeek})</button>
                                <button class="btn btn-gold" onclick="app.showStrengthProgram()">🏋️ View Strength (Level ${this.data.currentStrengthLevel})</button>
                            </div>
                        </div>
 
                        ${this.renderModals()}
                    `;
                }
                if (!this.data.setupComplete) {
                    document.getElementById('weight') && document.getElementById('weight').focus();
                }
            }
 
            renderModals() {
                return `
                    <div class="modal" id="swimModal">
                        <div class="modal-content">
                            <div class="modal-header">
                                <span id="swimTitle">Swimming</span>
                                <button class="modal-close" onclick="document.getElementById('swimModal').classList.remove('active')">×</button>
                            </div>
                            <div class="modal-body" id="swimBody"></div>
                        </div>
                    </div>
 
                    <div class="modal" id="strModal">
                        <div class="modal-content">
                            <div class="modal-header">
                                <span id="strTitle">Strength</span>
                                <button class="modal-close" onclick="document.getElementById('strModal').classList.remove('active')">×</button>
                            </div>
                            <div class="modal-body" id="strBody"></div>
                        </div>
                    </div>
 
                    <div class="modal" id="overrideModal">
                        <div class="modal-content">
                            <div class="modal-header">
                                <span>Override Program</span>
                                <button class="modal-close" onclick="document.getElementById('overrideModal').classList.remove('active')">×</button>
                            </div>
                            <div class="modal-body">
                                <div class="form-group">
                                    <label>Swim Week (1-20)</label>
                                    <input type="number" id="overrideSwim" min="1" max="20" value="${this.data.swimProgramWeek}">
                                </div>
                                <div class="form-group">
                                    <label>Strength Level (0-15)</label>
                                    <input type="number" id="overrideStr" min="0" max="15" value="${this.data.currentStrengthLevel}">
                                </div>
                                <button class="btn btn-gold" onclick="app.applyOverride()">Apply</button>
                            </div>
                        </div>
                    </div>
                `;
            }
 
            handleSetup() {
                const w = document.getElementById('weight').value;
                if (!w) { alert('Enter weight'); return; }
                this.data.setupComplete = true;
                this.data.programStart = new Date().toISOString();
                this.data.stats = { weight: parseFloat(w) };
                this.saveData();
                this.render();
            }
 
            showSwimProgram() {
                const w = Math.min(this.data.swimProgramWeek, 20);
                const prog = SWIM[w];
                let html = `<div class="alert">Week ${w} Swimming Program</div>`;
                
                ['wed', 'fri'].forEach(day => {
                    const p = prog[day];
                    html += `
                        <div class="workout-detail" style="margin-bottom: 1.5rem;">
                            <strong>${day.toUpperCase()}</strong> — ${p.type} (${p.dist}, ${p.time})<br>
                            <span style="color: var(--primary); font-weight: 600;">🎯 Drill: ${p.drill}</span><br>
                            ${p.sets.map(s => `• ${s}`).join('<br>')}
                        </div>
                    `;
                });
 
                document.getElementById('swimTitle').textContent = `🏊 Week ${w}`;
                document.getElementById('swimBody').innerHTML = html;
                document.getElementById('swimModal').classList.add('active');
            }
 
            showStrengthProgram() {
                const l = Math.min(this.data.currentStrengthLevel, 15);
                const prog = STR[l];
                let html = `<div class="alert">Level ${l}: ${prog.name}</div>`;
                html += `<div class="workout-detail" style="margin-bottom: 1rem;">
                    <strong>${prog.time} • ${prog.rounds} rounds • ${prog.rest} rest</strong>
                </div>`;
 
                prog.ex.forEach(ex => {
                    html += `<div class="workout-detail">• <strong>${ex.e}</strong>: ${ex.r}${ex.n ? ` <span style="color: #6c757d;">(${ex.n})</span>` : ''}</div>`;
                });
 
                document.getElementById('strTitle').textContent = `🏋️ Level ${l}`;
                document.getElementById('strBody').innerHTML = html;
                document.getElementById('strModal').classList.add('active');
            }
 
            showOverride() {
                document.getElementById('overrideModal').classList.add('active');
            }
 
            applyOverride() {
                const sw = parseInt(document.getElementById('overrideSwim').value);
                const sl = parseInt(document.getElementById('overrideStr').value);
                
                if (isNaN(sw) || isNaN(sl)) { alert('Enter valid numbers'); return; }
                if (sw < 1 || sw > 20 || sl < 0 || sl > 15) { alert('Out of range'); return; }
 
                this.data.swimProgramWeek = sw;
                this.data.currentStrengthLevel = sl;
                this.saveData();
                document.getElementById('overrideModal').classList.remove('active');
                this.render();
            }
 
            exportData() {
                const str = JSON.stringify(this.data, null, 2);
                const blob = new Blob([str], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `workout-v4-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            }
        }
 
        const app = new App();
    </script>
</body>
</html>
