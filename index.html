    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #2d5016;
            --accent-gold: #d4af37;
            --light-green: #4a7c2c;
            --bg-white: #ffffff;
            --text-dark: #2c3e50;
            --success-green: #27ae60;
            --light-gray: #f8f9fa;
            --border-gray: #dee2e6;
            --warning-orange: #f39c12;
            --danger-red: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--light-gray);
            color: var(--text-dark);
            line-height: 1.6;
            padding-bottom: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--light-green) 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .week-info {
            font-size: 0.95rem;
            opacity: 0.95;
            font-weight: 500;
        }

        .sync-status {
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: rgba(255,255,255,0.15);
            border-radius: 6px;
            font-size: 0.875rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h2 {
            color: var(--primary-green);
            font-size: 1.25rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .day-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-radius: 8px;
            border: 2px solid var(--border-gray);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .day-item:hover {
            border-color: var(--primary-green);
            background: var(--light-gray);
        }

        .day-item.completed {
            border-color: var(--success-green);
            background: rgba(39, 174, 96, 0.05);
        }

        .day-item.skipped {
            border-color: var(--warning-orange);
            background: rgba(243, 156, 18, 0.05);
        }

        .day-label {
            flex: 1;
            font-weight: 600;
            color: var(--text-dark);
        }

        .day-date {
            font-size: 0.875rem;
            color: #6c757d;
            margin-right: 0.75rem;
        }

        .day-status {
            font-size: 1.25rem;
        }

        .workout-badge {
            display: inline-block;
            padding: 0.25rem 0.65rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 0.5rem;
            margin-top: 0.25rem;
        }

        .workout-badge.swim {
            background: rgba(52, 152, 219, 0.15);
            color: #2980b9;
        }

        .workout-badge.strength {
            background: rgba(155, 89, 182, 0.15);
            color: #8e44ad;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            width: 100%;
            justify-content: center;
        }

        .btn-primary {
            background: var(--primary-green);
            color: white;
        }

        .btn-primary:hover {
            background: var(--light-green);
            transform: translateY(-1px);
        }

        .btn-gold {
            background: var(--accent-gold);
            color: var(--text-dark);
        }

        .btn-gold:hover {
            background: #c9a52b;
            transform: translateY(-1px);
        }

        .btn-outline {
            background: white;
            border: 2px solid var(--primary-green);
            color: var(--primary-green);
        }

        .btn-outline:hover {
            background: var(--primary-green);
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 2rem;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .modal-header {
            background: var(--primary-green);
            color: white;
            padding: 1.25rem;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 1.25rem;
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.2);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .alert-info {
            background: rgba(52, 152, 219, 0.1);
            border-left: 4px solid #3498db;
            color: #2c3e50;
        }

        .alert-warning {
            background: rgba(243, 156, 18, 0.1);
            border-left: 4px solid #f39c12;
            color: #2c3e50;
        }

        .workout-section {
            margin-bottom: 1.5rem;
        }

        .workout-section h3 {
            color: var(--primary-green);
            font-size: 1.1rem;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--light-gray);
        }

        .workout-detail {
            padding: 0.5rem 0;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-group input[type="number"],
        .form-group input[type="date"],
        .form-group input[type="time"] {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border-gray);
            border-radius: 8px;
            font-size: 1rem;
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .radio-item {
            flex: 1;
            min-width: 60px;
        }

        .radio-item input[type="radio"] {
            display: none;
        }

        .radio-item label {
            display: block;
            padding: 0.75rem;
            text-align: center;
            border: 2px solid var(--border-gray);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .radio-item input[type="radio"]:checked + label {
            background: var(--primary-green);
            color: white;
            border-color: var(--primary-green);
        }

        .checkbox-group {
            display: grid;
            gap: 0.5rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-item label {
            cursor: pointer;
            font-weight: 500;
        }

        .planning-section {
            margin-bottom: 1.5rem;
        }

        .planning-section h3 {
            font-size: 1rem;
            color: var(--primary-green);
            margin-bottom: 0.75rem;
        }

        .quick-actions {
            display: grid;
            gap: 0.75rem;
        }

        @media (min-width: 768px) {
            .quick-actions {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .setup-card {
            text-align: center;
            padding: 2rem 1rem;
        }

        .setup-card h2 {
            color: var(--primary-green);
            margin-bottom: 1rem;
            justify-content: center;
        }

        .setup-card p {
            color: #6c757d;
            margin-bottom: 1.5rem;
        }

        input[type="file"] {
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .stat-box {
            text-align: center;
            padding: 1rem;
            background: var(--light-gray);
            border-radius: 8px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-green);
        }

        .stat-label {
            font-size: 0.875rem;
            color: #6c757d;
        }
    </style>
</head>

                return defaultData;

            saveData() {
                localStorage.setItem('workoutData', JSON.stringify(this.data));
            }

            getCurrentWeekNumber() {
                if (!this.data.programStart) return 1;
                
                const now = new Date();
                const monday = new Date(now);
                monday.setDate(now.getDate() - (now.getDay() || 7) + 1);
                monday.setHours(0, 0, 0, 0);

                const startMonday = new Date(this.data.programStart);
                const diffTime = monday.getTime() - startMonday.getTime();
                const diffWeeks = Math.floor(diffTime / (7 * 24 * 60 * 60 * 1000));
                
                return Math.min(Math.max(1 + diffWeeks, 1), 20);
            }

            getSwimProgramForWeek(calendarWeek) {
                // Direct week mapping for Week 1-12
                return calendarWeek;
            }

            getActualSwimWeek() {
                // Just return the current swim program week (respects manual overrides)
                return Math.min(this.data.swimProgramWeek || 1, 20);
            }

            updateSwimProgramWeekFromRegression() {
                // Check last 2 weeks (4 sessions) for regression
                // ONLY call this when logging a session
                const currentWeek = this.getCurrentWeekNumber();
                const lastTwoWeeksSessions = this.data.sessions.filter(s => 
                    s.type === 'swim' && 
                    s.week >= currentWeek - 2 && 
                    s.week < currentWeek
                );
                
                const completedCount = lastTwoWeeksSessions.filter(s => s.completed).length;
                
                // If less than 2 completed out of last 4 → don't advance program
                if (lastTwoWeeksSessions.length >= 4 && completedCount < 2) {
                    // Stay at current program week (regression triggered)
                    return;
                }
                
                // Advance program normally
                if (completedCount >= 2 || lastTwoWeeksSessions.length < 4) {
                    this.data.swimProgramWeek = currentWeek;
                    this.saveData();
                }
            }

            getWeekDates(offset = 0) {
                if (!this.data.programStart) {
                    const today = new Date();
                    const monday = new Date(today);
                    monday.setDate(today.getDate() - (today.getDay() || 7) + 1);
                    monday.setDate(monday.getDate() + (offset * 7));
                    
                    const dates = [];
                    for (let i = 0; i < 7; i++) {
                        const day = new Date(monday);
                        day.setDate(monday.getDate() + i);
                        dates.push(day);
                    }
                    return dates;
                }

                const startMonday = new Date(this.data.programStart);
                const currentWeek = this.getCurrentWeekNumber();
                const targetMonday = new Date(startMonday);
                targetMonday.setDate(startMonday.getDate() + ((currentWeek - 1 + offset) * 7));

                const dates = [];
                for (let i = 0; i < 7; i++) {
                    const day = new Date(targetMonday);
                    day.setDate(targetMonday.getDate() + i);
                    dates.push(day);
                }
                return dates;
            }

            formatDateRange(dates) {
                const start = dates[0];
                const end = dates[6];
                const options = { month: 'short', day: 'numeric' };
                return `${start.toLocaleDateString('en-US', options)} - ${end.toLocaleDateString('en-US', options)}`;
            }

                const weight = document.getElementById('weight').value;
                const freestyle50m = document.getElementById('freestyle50m').value;
                const pullUps = document.getElementById('pullUps').value;
                const pushUps = document.getElementById('pushUps').value;
                const plank = document.getElementById('plank').value;

                if (!weight || !freestyle50m || !pullUps || !pushUps || !plank) {
                    alert('Please fill in all fields!');
                    return;
                }

                const today = new Date();
                const monday = new Date(today);
                monday.setDate(today.getDate() - (today.getDay() || 7) + 1);
                monday.setHours(0, 0, 0, 0);
                // Start the user at Week 3 (early weeks already done) by setting
                // the program start two weeks in the past.
                monday.setDate(monday.getDate() - 14);

                this.data.setupComplete = true;
                this.data.programStart = monday.toISOString();
                this.data.stats = {
                    weight: parseFloat(weight),
                    freestyle50m: parseFloat(freestyle50m),
                    pullUps: parseInt(pullUps),
                    pushUps: parseInt(pushUps),
                    plank: parseInt(plank)
                };
                this.data.currentStrengthLevel = 1;
                this.data.currentSwimProgram = 'A';
                this.data.swimProgramWeek = 3;
                
                this.saveData();
                this.render();
            }

            handleOverride() {
                const swimWeek = parseInt(document.getElementById('overrideSwimWeek').value);
                const strengthLevel = parseInt(document.getElementById('overrideStrengthLevel').value);

                if (isNaN(swimWeek) || isNaN(strengthLevel)) {
                    alert('Please select valid values');
                    return;
                }

                this.data.swimProgramWeek = Math.min(Math.max(swimWeek, 1), 20);
                this.data.currentStrengthLevel = Math.min(Math.max(strengthLevel, 0), 15);

                this.saveData();
                this.closeModal('overrideModal');
                this.render();
            }

            handlePlanSubmit() {
                const form = document.getElementById('planForm');
                const formData = new FormData(form);
                const week = this.getCurrentWeekNumber();
                
                const schedule = {
                    swim1: formData.get('swim1'),
                    swim2: formData.get('swim2'),
                    strength: formData.get('strength')
                };

                // Validate no conflicts
                const days = [schedule.swim1, schedule.swim2, schedule.strength].filter(d => d !== 'skip');
                const uniqueDays = [...new Set(days)];
                
                if (days.length !== uniqueDays.length) {
                    alert('Cannot schedule multiple workouts on the same day!');
                    return;
                }

                this.data.weeklySchedules[week] = schedule;

                // Preserve any existing status for this week, keyed by type+session,
                // so rescheduling a day doesn't wipe a logged result.
                const prior = {};
                this.data.sessions
                    .filter(s => s.week === week)
                    .forEach(s => { prior[`${s.type}-${s.session}`] = s; });

                // Rebuild this week's sessions from the (possibly new) schedule.
                this.data.sessions = this.data.sessions.filter(s => s.week !== week);

                const rebuild = (day, type, session) => {
                    if (day === 'skip') return;
                    const old = prior[`${type}-${session}`];
                    const entry = {
                        week,
                        day,
                        type,
                        session,
                        completed: old ? old.completed : false,
                        skipped: old ? old.skipped : false,
                        date: old ? old.date : null,
                        notes: old ? old.notes : ''
                    };
                    if (old && old.gymSubstitution) entry.gymSubstitution = old.gymSubstitution;
                    this.data.sessions.push(entry);
                };

                rebuild(schedule.swim1, 'swim', '1');
                rebuild(schedule.swim2, 'swim', '2');
                rebuild(schedule.strength, 'strength', '1');
                
                this.saveData();
                this.closeModal('planModal');
                this.render();
            }

            createSession(week, day, type, session) {
                const existing = this.data.sessions.find(s => 
                    s.week === week && s.day === day && s.type === type
                );
                
                if (!existing) {
                    this.data.sessions.push({
                        week,
                        day,
                        type,
                        session,
                        completed: false,
                        skipped: false,
                        date: null,
                        notes: ''
                    });
                }
            }

            showWorkoutDetails(day, type, week, session) {
                const modal = document.getElementById('workoutModal');
                const title = document.getElementById('workoutModalTitle');
                const body = document.getElementById('workoutModalBody');

                if (type === 'swim') {
                    const actualWeek = this.getActualSwimWeek();
                    const dayKey = session === '1' ? 'wed' : 'fri';
                    const workout = PROGRAMS.swimming[actualWeek]?.[dayKey];
                    
                    if (!workout) {
                        body.innerHTML = '<div class="alert alert-warning">Program not available</div>';
                        this.openModal('workoutModal');
                        return;
                    }

                    const isRepeating = actualWeek !== week;
                    title.textContent = `Week ${week} - Swim Session ${session}${isRepeating ? ` (Week ${actualWeek} program)` : ''}`;
                    
                    let html = `
                        ${isRepeating ? `<div class="alert alert-warning">
                            <span>⚠️</span>
                            <span>Repeating Week ${actualWeek} program due to recent skips</span>
                        </div>` : ''}
                        <div class="alert alert-info">
                            <span>📏</span>
                            <span><strong>${workout.total}</strong> • ${workout.type} • ${workout.time}</span>
                        </div>
                    `;
                    
                    workout.sections.forEach(section => {
                        html += `
                            <div class="workout-section">
                                <h3>${section.name} - ${section.distance}</h3>
                                ${section.details.map(d => `<div class="workout-detail">• ${d}</div>`).join('')}
                            </div>
                        `;
                    });
                    
                    body.innerHTML = html;
                } else {
                    const strengthLevel = this.data.currentStrengthLevel;
                    const program = PROGRAMS.strength[strengthLevel];
                    
                    if (!program) {
                        body.innerHTML = '<div class="alert alert-warning">Program not available</div>';
                        this.openModal('workoutModal');
                        return;
                    }

                    title.textContent = `Week ${week} - Strength Level ${strengthLevel}`;
                    
                    let html = `
                        <div class="alert alert-info">
                            <span>💪</span>
                            <span><strong>${program.name}</strong> • ${program.time} • ${program.rounds} rounds • ${program.rest} rest</span>
                        </div>
                    `;
                    
                    html += '<div class="workout-section"><h3>Full Workout</h3>';
                    program.full.forEach(ex => {
                        html += `<div class="workout-detail">• <strong>${ex.ex}</strong>: ${ex.reps}${ex.notes ? ` <span style="color: #6c757d;">(${ex.notes})</span>` : ''}</div>`;
                    });
                    html += '</div>';
                    
                    if (program.notes) {
                        html += `<div class="alert alert-warning"><span>💡</span><span>${program.notes}</span></div>`;
                    }
                    
                    body.innerHTML = html;
                }

                this.openModal('workoutModal');
            }

            openLogModal() {
                const week = this.getCurrentWeekNumber();
                const schedule = this.data.weeklySchedules[week];
                const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
                
                const sessions = [];
                days.forEach(day => {
                    if (schedule.swim1 === day) sessions.push({ day, type: 'swim', session: '1', label: 'Swim 1' });
                    if (schedule.swim2 === day) sessions.push({ day, type: 'swim', session: '2', label: 'Swim 2' });
                    if (schedule.strength === day) sessions.push({ day, type: 'strength', session: '1', label: 'Strength' });
                });

                const body = document.getElementById('logModalBody');

                if (sessions.length === 0) {
                    body.innerHTML = '<div class="alert alert-info"><span>ℹ️</span><span>No sessions scheduled this week yet. Plan your week first.</span></div>';
                    this.openModal('logModal');
                    return;
                }

                let html = '<div class="form-group"><label>Select Session</label><select id="sessionSelect" style="width: 100%; padding: 0.75rem; border: 2px solid var(--border-gray); border-radius: 8px; font-size: 1rem;">';
                
                sessions.forEach(s => {
                    const dayLabel = s.day.charAt(0).toUpperCase() + s.day.slice(1);
                    const existing = this.data.sessions.find(sess => 
                        sess.week === week && sess.day === s.day && sess.type === s.type
                    );
                    const status = existing?.completed ? '✓' : existing?.skipped ? '⚠️' : '';
                    html += `<option value="${s.day}-${s.type}-${s.session}">${dayLabel} - ${s.label} ${status}</option>`;
                });
                
                html += '</select></div>';

                // Status options are rendered dynamically based on the selected session type.
                html += '<div id="statusContainer"></div>';

                // Gym-substitution checkboxes — ONLY shown when "Gym substitution" is chosen.
                html += `
                    <div id="gymCheckboxes" style="display: none;">
                        <div class="form-group">
                            <label>Gym substitution — check ALL areas you trained:</label>
                            <div class="checkbox-group">
                                <div class="checkbox-item">
                                    <input type="checkbox" id="gym-legs">
                                    <label for="gym-legs">Legs</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="gym-upper-push">
                                    <label for="gym-upper-push">Upper Push</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="gym-upper-pull">
                                    <label for="gym-upper-pull">Upper Pull</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="gym-core">
                                    <label for="gym-core">Core</label>
                                </div>
                            </div>
                            <div class="alert alert-warning" style="margin-top: 0.5rem;">
                                <span>⚠️</span>
                                <span>Counts as completed only if all four areas are covered.</span>
                            </div>
                        </div>
                    </div>
                `;
                
                html += '<button class="btn btn-gold" id="saveLogBtn" style="width: 100%; margin-top: 1rem;"><span>💾</span><span>Save</span></button>';
                
                body.innerHTML = html;

                const sessionSelect = document.getElementById('sessionSelect');
                const statusContainer = document.getElementById('statusContainer');
                const gymCheckboxes = document.getElementById('gymCheckboxes');

                const updateGymVisibility = () => {
                    const gymRadio = document.getElementById('status-gym');
                    gymCheckboxes.style.display = (gymRadio && gymRadio.checked) ? 'block' : 'none';
                };

                const renderStatusOptions = () => {
                    const [day, type] = sessionSelect.value.split('-');
                    if (type === 'strength') {
                        // Simple, clear choice. Full home program = one tap, no checkboxes.
                        statusContainer.innerHTML = `
                            <div class="form-group">
                                <label>How did it go?</label>
                                <div class="radio-group" style="flex-direction: column; gap: 0.5rem;">
                                    <div class="radio-item" style="min-width: 100%;">
                                        <input type="radio" name="status" value="full" id="status-full" checked>
                                        <label for="status-full">✅ Completed — full home program</label>
                                    </div>
                                    <div class="radio-item" style="min-width: 100%;">
                                        <input type="radio" name="status" value="gym" id="status-gym">
                                        <label for="status-gym">🏋️ Gym substitution</label>
                                    </div>
                                    <div class="radio-item" style="min-width: 100%;">
                                        <input type="radio" name="status" value="skipped" id="status-skipped">
                                        <label for="status-skipped">⚠️ Skipped</label>
                                    </div>
                                </div>
                            </div>
                        `;
                    } else {
                        statusContainer.innerHTML = `
                            <div class="form-group">
                                <label>How did it go?</label>
                                <div class="radio-group">
                                    <div class="radio-item">
                                        <input type="radio" name="status" value="completed" id="status-completed" checked>
                                        <label for="status-completed">✅ Completed</label>
                                    </div>
                                    <div class="radio-item">
                                        <input type="radio" name="status" value="skipped" id="status-skipped">
                                        <label for="status-skipped">⚠️ Skipped</label>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                    document.querySelectorAll('input[name="status"]').forEach(r =>
                        r.addEventListener('change', updateGymVisibility)
                    );
                    updateGymVisibility();
                };

                sessionSelect.addEventListener('change', renderStatusOptions);
                renderStatusOptions();

                document.getElementById('saveLogBtn').addEventListener('click', () => this.saveLog());

                this.openModal('logModal');
            }

            saveLog() {
                const week = this.getCurrentWeekNumber();
                const sessionSelect = document.getElementById('sessionSelect');
                const [day, type, session] = sessionSelect.value.split('-');
                const statusVal = document.querySelector('input[name="status"]:checked')?.value;

                let completed = false;
                let skipped = false;
                let gymAreas = null;

                if (type === 'strength') {
                    if (statusVal === 'full') {
                        completed = true;
                    } else if (statusVal === 'gym') {
                        const legs = document.getElementById('gym-legs').checked;
                        const push = document.getElementById('gym-upper-push').checked;
                        const pull = document.getElementById('gym-upper-pull').checked;
                        const core = document.getElementById('gym-core').checked;
                        gymAreas = { legs, push, pull, core };
                        completed = legs && push && pull && core;
                        if (!completed) {
                            alert('A gym substitution only counts as completed when Legs, Upper Push, Upper Pull and Core are all checked. Logging it as not completed.');
                        }
                    } else {
                        skipped = true;
                    }
                } else {
                    if (statusVal === 'completed') completed = true;
                    else skipped = true;
                }

                const idx = this.data.sessions.findIndex(s => 
                    s.week === week && s.day === day && s.type === type
                );

                if (idx !== -1) {
                    this.data.sessions[idx].completed = completed;
                    this.data.sessions[idx].skipped = skipped;
                    this.data.sessions[idx].date = new Date().toISOString();
                    if (gymAreas) this.data.sessions[idx].gymSubstitution = gymAreas;
                    else delete this.data.sessions[idx].gymSubstitution;
                }

                // Swim progression/regression (only update if actually logging a swim)
                if (type === 'swim') {
                    this.updateSwimProgramWeekFromRegression();
                }

                // Strength progression
                if (type === 'strength') {
                    if (completed) {
                        this.data.strengthSkipCounter = 0;
                        this.data.lastStrengthWeek = week;
                        const completedStrength = this.data.sessions.filter(s => 
                            s.type === 'strength' && s.completed && s.week >= week - 1
                        ).length;
                        if (completedStrength >= 2 && this.data.currentStrengthLevel < 11) {
                            this.data.currentStrengthLevel++;
                        }
                    } else if (skipped) {
                        if (this.data.lastStrengthWeek && (week - this.data.lastStrengthWeek) >= 3 && this.data.currentStrengthLevel > 0) {
                            this.data.currentStrengthLevel--;
                        }
                    }
                }

                this.saveData();
                this.closeModal('logModal');
                this.render();
            }

            calculateNutrition() {
                const timeInput = document.getElementById('nutritionTime').value;
                if (!timeInput) return;

                const [hours, minutes] = timeInput.split(':').map(Number);
                const workoutTime = hours * 60 + minutes;

                const formatTime = (mins) => {
                    let h = Math.floor(mins / 60) % 24;
                    if (h < 0) h += 24;
                    const m = mins % 60;
                    return `${h.toString().padStart(2, '0')}:${Math.abs(m).toString().padStart(2, '0')}`;
                };

                let html = '';
                
                if (hours >= 6 && hours < 11) {
                    const wake = workoutTime - 60;
                    const lightBreakfast = workoutTime - 45;
                    const postWorkout = workoutTime + 30;
                    
                    html = `
                        <div class="workout-section">
                            <h3>Morning Workout Schedule (${timeInput})</h3>
                            <div class="workout-detail">📍 ${formatTime(wake)} - Wake up, hydrate (water)</div>
                            <div class="workout-detail">📍 ${formatTime(lightBreakfast)} - Light breakfast
                                <br>&nbsp;&nbsp;&nbsp;• Banana + coffee, OR
                                <br>&nbsp;&nbsp;&nbsp;• Toast with honey
                                <br>&nbsp;&nbsp;&nbsp;• Keep it light!
                            </div>
                            <div class="workout-detail">📍 ${timeInput} - WORKOUT 🏊/🏋️</div>
                            <div class="workout-detail">📍 ${formatTime(postWorkout)} - Post-workout meal
                                <br>&nbsp;&nbsp;&nbsp;• Protein + carbs
                                <br>&nbsp;&nbsp;&nbsp;• Full breakfast
                            </div>
                        </div>
                        <div class="alert alert-warning">
                            <span>⚠️</span>
                            <span><strong>Morning tip:</strong> Don't workout on completely empty stomach</span>
                        </div>
                    `;
                } else if (hours >= 11 && hours < 15) {
                    const breakfast = workoutTime - 180;
                    const snack = workoutTime - 90;
                    const postWorkout = workoutTime + 60;
                    
                    html = `
                        <div class="workout-section">
                            <h3>Midday Workout Schedule (${timeInput})</h3>
                            <div class="workout-detail">📍 ${formatTime(breakfast)} - Breakfast (normal meal)</div>
                            <div class="workout-detail">📍 ${formatTime(snack)} - Mid-morning snack
                                <br>&nbsp;&nbsp;&nbsp;• Fruit + energy bar
                                <br>&nbsp;&nbsp;&nbsp;• Greek yogurt
                            </div>
                            <div class="workout-detail">📍 ${timeInput} - WORKOUT 🏊/🏋️</div>
                            <div class="workout-detail">📍 ${formatTime(postWorkout)} - Post-workout lunch
                                <br>&nbsp;&nbsp;&nbsp;• Protein + carbs
                                <br>&nbsp;&nbsp;&nbsp;• Full meal
                            </div>
                        </div>
                        <div class="alert alert-warning">
                            <span>⚠️</span>
                            <span><strong>Don't:</strong> Heavy breakfast right before workout</span>
                        </div>
                    `;
                } else if (hours >= 15 && hours < 18) {
                    const lunch = workoutTime - 180;
                    const snack = workoutTime - 90;
                    const postWorkout = workoutTime + 90;
                    
                    html = `
                        <div class="workout-section">
                            <h3>Afternoon Workout Schedule (${timeInput})</h3>
                            <div class="workout-detail">📍 ${formatTime(lunch)} - Lunch (moderate, not heavy)</div>
                            <div class="workout-detail">📍 ${formatTime(snack)} - Afternoon snack
                                <br>&nbsp;&nbsp;&nbsp;• Banana + coffee
                                <br>&nbsp;&nbsp;&nbsp;• Energy bar
                            </div>
                            <div class="workout-detail">📍 ${timeInput} - WORKOUT 🏊/🏋️</div>
                            <div class="workout-detail">📍 ${formatTime(postWorkout)} - Post-workout dinner
                                <br>&nbsp;&nbsp;&nbsp;• Protein + carbs
                            </div>
                        </div>
                        <div class="alert alert-warning">
                            <span>⚠️</span>
                            <span><strong>Don't:</strong> Heavy lunch 2 hours before workout</span>
                        </div>
                    `;
                } else {
                    const lunch = workoutTime - 240;
                    const espresso = workoutTime - 180;
                    const snackStart = workoutTime - 120;
                    const snackEnd = workoutTime - 90;
                    const postWorkout = workoutTime + 90;
                    
                    html = `
                        <div class="workout-section">
                            <h3>Evening Workout Schedule (${timeInput})</h3>
                            <div class="workout-detail">📍 ${formatTime(lunch)} - Lunch (normal meal)</div>
                            <div class="workout-detail">📍 ${formatTime(espresso)} - Espresso ☕</div>
                            <div class="workout-detail">📍 ${formatTime(snackStart)}-${formatTime(snackEnd)} - Pre-workout snack
                                <br>&nbsp;&nbsp;&nbsp;• Banana + energy bar, OR
                                <br>&nbsp;&nbsp;&nbsp;• Toast with honey
                            </div>
                            <div class="workout-detail">📍 ${timeInput} - WORKOUT 🏊/🏋️</div>
                            <div class="workout-detail">📍 ${formatTime(postWorkout)} - Post-workout meal
                                <br>&nbsp;&nbsp;&nbsp;• Protein + carbs
                                <br>&nbsp;&nbsp;&nbsp;• Dinner
                            </div>
                        </div>
                        <div class="alert alert-warning">
                            <span>⚠️</span>
                            <span><strong>Don't:</strong> Heavy meal 2 hours before workout</span>
                        </div>
                    `;
                }

                const resultsDiv = document.getElementById('nutritionResults');
                resultsDiv.innerHTML = html;
            }

            openModal(modalId) {
                const modal = document.getElementById(modalId);
                if (modal) {
                    modal.classList.add('active');
                }
            }

            closeModal(modalId) {
                const modal = document.getElementById(modalId);
                if (modal) {
                    modal.classList.remove('active');
                }
            }

            exportData() {
                const dataStr = JSON.stringify(this.data, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `workout-data-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                URL.revokeObjectURL(url);
            }

            importData(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const imported = JSON.parse(e.target.result);
                        this.data = imported;
                        this.saveData();
                        this.render();
                        alert('Data imported successfully!');
                    } catch (error) {
                        alert('Error importing data. Please check the file format.');
                    }
                };
                reader.readAsText(file);
            }
        }

        // Initialize app
        window.app = new WorkoutApp();
    </script>
</body>
