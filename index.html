<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker v5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #2ecc71;
            --dark-bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-light: #ffffff;
            --text-dim: #b0b0b0;
            --gold: #f39c12;
            --success: #27ae60;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg);
            color: var(--text-light);
            padding: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary-green);
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .header-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .info-item {
            display: flex;
            justify-content: space-between;
        }

        .info-value {
            color: var(--primary-green);
            font-weight: 600;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--primary-green);
            color: var(--dark-bg);
        }

        .btn-primary:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-light);
            border: 2px solid var(--primary-green);
        }

        .btn-secondary:hover {
            background: var(--primary-green);
            color: var(--dark-bg);
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primary-green);
        }

        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: var(--primary-green);
        }

        .card h3 {
            font-size: 1.1rem;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            color: var(--text-light);
        }

        .session-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 1rem;
            align-items: center;
            padding: 1rem;
            background: rgba(46, 204, 113, 0.05);
            border-radius: 6px;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            .session-row {
                grid-template-columns: 1fr;
            }
        }

        .session-label {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .session-status {
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .status-completed {
            background: var(--success);
            color: white;
        }

        .status-skip {
            background: #e74c3c;
            color: white;
        }

        .status-pending {
            background: var(--text-dim);
            color: var(--dark-bg);
            cursor: pointer;
        }

        .status-pending:hover {
            background: var(--gold);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            border: 2px solid var(--primary-green);
        }

        .modal-content h3 {
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--primary-green);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--primary-green);
            border-radius: 4px;
            color: var(--text-light);
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            background: rgba(46, 204, 113, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .modal-close {
            background: var(--text-dim);
            color: var(--dark-bg);
        }

        .modal-close:hover {
            background: var(--text-light);
        }

        .program-view {
            background: rgba(46, 204, 113, 0.05);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        .program-view h4 {
            color: var(--primary-green);
            margin-bottom: 0.5rem;
        }

        .program-section {
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(46, 204, 113, 0.2);
        }

        .program-section:last-child {
            border-bottom: none;
        }

        .section-name {
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 0.3rem;
        }

        .section-distance {
            font-size: 0.85rem;
            color: var(--primary-green);
        }

        .section-details {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: 0.3rem;
            margin-left: 1rem;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .stat-box {
            background: rgba(46, 204, 113, 0.05);
            padding: 1rem;
            border-radius: 6px;
            text-align: center;
            border: 1px solid rgba(46, 204, 113, 0.2);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-green);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: 0.3rem;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: var(--card-bg);
            border: 2px solid var(--text-dim);
            color: var(--text-light);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary-green);
            color: var(--dark-bg);
            border-color: var(--primary-green);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .override-btn {
            background: white;
            border: 2px solid var(--primary-green);
            color: var(--primary-green);
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }

        .override-btn:hover {
            background: var(--primary-green);
            color: white;
        }
    </style>
</head>

            logSession(type, completed) {
                const week = this.getCurrentWeekNumber();
                const today = new Date().toDateString();

                const sessionIndex = this.data.sessions.findIndex(s => 
                    s.type === type && 
                    new Date(s.date).toDateString() === today &&
                    s.week === week
                );

                if (sessionIndex >= 0) {
                    this.data.sessions[sessionIndex].completed = completed;
                } else {
                    this.data.sessions.push({
                        type,
                        completed,
                        date: new Date().toISOString(),
                        week
                    });
                }

                // Only update progression when logging sessions (Option B)
                if (type === 'swim' && completed) {
                    this.updateSwimProgression();
                } else if (type === 'strength' && completed) {
                    this.updateStrengthProgression();
                }

                this.saveData();
                this.render();
            }

            updateSwimProgression() {
                const currentWeek = this.getCurrentWeekNumber();
                const lastTwoWeeksSessions = this.data.sessions.filter(s => 
                    s.type === 'swim' && 
                    s.week >= currentWeek - 2 && 
                    s.week <= currentWeek &&
                    s.completed
                );

                // If 2+ sessions completed in last 2 weeks → can advance program
                if (lastTwoWeeksSessions.length >= 2) {
                    this.data.swimProgramWeek = Math.min(currentWeek, 20);
                    this.saveData();
                }
            }

            updateStrengthProgression() {
                const currentWeek = this.getCurrentWeekNumber();
                const lastThreeWeeksSessions = this.data.sessions.filter(s =>
                    s.type === 'strength' &&
                    s.week >= currentWeek - 3 &&
                    s.completed
                );

                // If at least 1 session per week → can advance
                if (lastThreeWeeksSessions.length >= 3) {
                    this.data.currentStrengthLevel = Math.min(this.data.currentStrengthLevel + 1, 15);
                    this.saveData();
                }
            }

                this.data.swimProgramWeek = Math.min(Math.max(swimWeek, 1), 20);
                this.data.currentStrengthLevel = Math.min(Math.max(strengthLevel, 0), 15);
                this.saveData();

            exportData() {
                const dataStr = JSON.stringify(this.data, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'workout_data.json';
                a.click();
            }

            importData() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'application/json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const imported = JSON.parse(event.target.result);
                            this.data = imported;
                            this.saveData();
                            this.render();
                            alert('Data imported successfully');
                        } catch {
                            alert('Failed to import data');
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }

            resetData() {
                this.data = this.loadData();
                this.saveData();
                this.render();
            }

                            </div>
                        </div>
                    `;
                    return;
                }

                document.getElementById('app').innerHTML = `
                    ${this.renderHeader()}
                    ${this.renderOverrideSection()}
                    ${this.renderSwimmingCard()}
                    ${this.renderStrengthCard()}
                    ${this.renderNutritionCard()}
                    ${this.renderProgressCard()}
                    ${this.renderDataCard()}
                    ${this.renderOverrideModal()}
                `;
            }

            setWeight(weight) {
                if (weight && weight > 0) {
                    this.data.userWeight = weight;
                    this.saveData();
                    this.render();
                } else {
                    alert('Please enter a valid weight');
                }
            }
        }

        // Initialize app globally
        window.app = new WorkoutApp();
    </script>
</body>
</html>
